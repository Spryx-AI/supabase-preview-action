name: 'Supabase Preview Action'
description: 'Waits for the Supabase Preview check and exposes branch credentials as outputs'

inputs:
  supabase_access_token:
    description: 'Supabase Management API access token'
    required: true
  project_ref:
    description: 'Parent Supabase project reference ID'
    required: true
  github_token:
    description: 'GitHub token used to poll the Supabase Preview check status'
    required: true
  check_name:
    description: 'Name of the GitHub check to wait for (default: "Supabase Preview")'
    required: false
    default: 'Supabase Preview'
  git_branch_name:
    description: 'Git branch name used to identify the preview branch (defaults to current GitHub ref)'
    required: false
    default: ''
  branch_name:
    description: 'Supabase branch name passed to `branches get` (defaults to git_branch_name)'
    required: false
    default: ''
  timeout_seconds:
    description: 'Timeout in seconds waiting for the Supabase Preview check (default: 300)'
    required: false
    default: '300'
  poll_interval_seconds:
    description: 'Polling interval in seconds while waiting for the check (default: 10)'
    required: false
    default: '10'
  include_seed:
    description: 'Run `supabase db push --include-seed` after the branch is ready'
    required: false
    default: 'false'

outputs:
  project_ref:
    description: 'Supabase project ref of the preview branch'
  supabase_url:
    description: 'Supabase API URL for the preview branch (https://<ref>.supabase.co)'
  anon_key:
    description: 'Supabase anonymous key for the preview branch'
  service_role_key:
    description: 'Supabase service role key for the preview branch'
  db_host:
    description: 'PostgreSQL host for the preview branch'
  db_port:
    description: 'PostgreSQL port for the preview branch'
  db_name:
    description: 'PostgreSQL database name for the preview branch'
  db_user:
    description: 'PostgreSQL user for the preview branch'
  db_password:
    description: 'PostgreSQL password for the preview branch (masked in logs)'
  db_connection_string:
    description: 'Full PostgreSQL connection string (if provided by the CLI output)'

runs:
  using: 'node20'
  main: 'dist/index.js'
